version: "3.9"

services:
  # ---------- Backend API ----------
  api:
    build: ./osspool-backend
    ports:
      - "8000:8000"
    env_file: ./osspool-backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./osspool-backend:/app
    networks:
      - osspool

  # ---------- Celery Worker ----------
  celery-worker:
    build: ./osspool-backend
    env_file: ./osspool-backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A app.core.celery_app:celery worker --loglevel=info --concurrency=4
    volumes:
      - ./osspool-backend:/app
    networks:
      - osspool

  # ---------- Celery Beat (Scheduler) ----------
  celery-beat:
    build: ./osspool-backend
    env_file: ./osspool-backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A app.core.celery_app:celery beat --loglevel=info
    volumes:
      - ./osspool-backend:/app
    networks:
      - osspool

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - osspool

  # ---------- Frontend ----------
  frontend:
    build: ./osspool-frontend
    ports:
      - "3000:3000"
    env_file: ./osspool-frontend/.env
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - osspool

volumes:
  redis-data:

networks:
  osspool:
    driver: bridge
